groups:
  - name: rez-ecosystem
    rules:
      # High error rate
      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status_code=~"5.."}[5m]))
          / sum(rate(http_requests_total[5m])) > 0.01
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate ({{ $value | humanizePercentage }})"
          description: "Service {{ $labels.service }} has >1% 5xx errors for 2+ minutes"

      # High p99 latency
      - alert: HighLatency
        expr: |
          histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p99 latency ({{ $value }}s)"
          description: "Service {{ $labels.service }} p99 latency exceeds 2s"

      # BullMQ queue depth
      - alert: BullMQQueueBacklog
        expr: bull_queue_size > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Queue {{ $labels.queue }} has {{ $value }} pending jobs"
          description: "Queue backlog persists for 5+ minutes"

      # BullMQ job failures
      - alert: BullMQJobFailures
        expr: |
          sum(rate(bull_queue_jobs_total{status="failed"}[5m]))
          / sum(rate(bull_queue_jobs_total[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Queue {{ $labels.queue }} has >5% failure rate"
          description: "Job failure rate persists for 5+ minutes"

      # Service down
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"

      # Payment Service Alerts
      - alert: PaymentFailureRate
        expr: |
          sum(rate(payment_failures_total[5m]))
          / sum(rate(payment_initiated_total[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Payment failure rate exceeds 5%"
          description: "Payment service is experiencing high failure rates"

      - alert: PaymentLatency
        expr: |
          histogram_quantile(0.95, sum(rate(payment_request_duration_seconds_bucket[5m])) by (le)) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Payment latency exceeds 5s"
          description: "Payment processing is slow"

      # Wallet Service Alerts
      - alert: WalletTransactionFailure
        expr: |
          sum(rate(wallet_transaction_failures_total[5m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Wallet transaction failures detected"
          description: "More than 10 wallet transaction failures per minute"

      - alert: InsufficientBalanceErrors
        expr: |
          sum(rate(wallet_insufficient_balance_total[5m])) > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High insufficient balance errors"
          description: "Users experiencing insufficient balance issues"

      # Order Service Alerts
      - alert: OrderCreationFailures
        expr: |
          sum(rate(order_creation_failures_total[5m])) > 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High order creation failure rate"
          description: "More than 20 order creation failures per minute"

      - alert: OrderStatusTransitionErrors
        expr: |
          sum(rate(order_status_transition_errors_total[5m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Order status transition errors"
          description: "State machine transitions failing"

      # Database Alerts
      - alert: MongoDBConnectionPoolExhausted
        expr: |
          mongodb_connection_pool_size / mongodb_connection_pool_max_size > 0.9
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "MongoDB connection pool nearly exhausted"
          description: "Connection pool usage above 90%"

      - alert: RedisConnectionErrors
        expr: |
          sum(rate(redis_connection_errors_total[5m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis connection errors detected"
          description: "More than 10 Redis errors per minute"

      # Circuit Breaker Alerts
      - alert: CircuitBreakerOpen
        expr: |
          circuit_breaker_state{state="open"} > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Circuit breaker open for {{ $labels.service }}"
          description: "Circuit breaker is preventing cascading failures"

      # High memory usage
      - alert: HighMemoryUsage
        expr: |
          process_resident_memory_bytes / process_max_memory_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Service {{ $labels.service }} memory usage >85%"

      # Circuit breaker open
      - alert: CircuitBreakerOpen
        expr: circuit_breaker_state == 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Circuit breaker OPEN for {{ $labels.service }}"
          description: "Service {{ $labels.service }} is not accepting traffic"
